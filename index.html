<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screener Theme Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#0a0a0a] text-white antialiased">
    <div id="root">
        <style>
            .initial-loader-wrap {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #050508;
                z-index: 999999;
                font-family: 'Outfit', sans-serif;
            }

            .loader-ring {
                width: 32px;
                height: 32px;
                border: 1px solid rgba(197, 160, 89, 0.1);
                border-top-color: #c5a059;
                border-radius: 50%;
                animation: s 0.6s linear infinite;
                will-change: transform;
            }

            .loader-text {
                margin-top: 16px;
                color: #c5a059;
                font-size: 8px;
                font-weight: 500;
                letter-spacing: 0.5em;
                text-transform: uppercase;
                opacity: 0.5;
            }

            @keyframes s {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <div class="initial-loader-wrap">
            <div class="loader-ring"></div>
            <div class="loader-text">INITIALIZING</div>
        </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
