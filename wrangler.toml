name = "nexus"
main = "cloudflare/worker.mjs"
compatibility_date = "2026-03-01"
workers_dev = true

[assets]
directory = "dist"
binding = "ASSETS"

[vars]
# Optional fallback origin. Leave empty for fully standalone Cloudflare mode.
# ORIGIN_BASE_URL = "https://your-origin.example.com"

[[r2_buckets]]
binding = "MARKET_MAP_SNAPSHOTS"
bucket_name = "market-map-snapshots"
preview_bucket_name = "market-map-snapshots-preview"

[triggers]
crons = ["40,45,50,55 3 * * 1-5", "0,5,10,15,20,25,30,35,40,45,50,55 4-9 * * 1-5", "0 10 * * 1-5"]
